<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>three-phone · Blank Template</title>
  <style>html, body { margin: 0; height: 100%; overflow: hidden; background: #0e0b16; }</style>

  <!-- 1) three-phone: a plain <script> that exposes window globals (enableGyroTap, rotationX, ...) -->
  <script src="../../dist/three-phone.js"></script>

  <!-- 2) three.js via import map -->
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/" } }
  </script>
</head>
<body>
  <!-- 3) loader: make THREE global, then run sketch.js (kept a plain, beginner-friendly script) -->
  <script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;
    const s = document.createElement('script');
    s.src = 'sketch.js';
    document.body.appendChild(s);
  </script>
</body>
</html>
